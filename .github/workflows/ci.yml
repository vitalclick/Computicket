name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: computicket
          POSTGRES_PASSWORD: computicket
          POSTGRES_DB: computicket
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U computicket"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://computicket:computicket@localhost:5432/computicket?schema=public
      NEXT_PUBLIC_API_URL: http://localhost:4000/v1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @computicket/db exec prisma migrate deploy
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:e2e
