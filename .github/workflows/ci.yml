name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: computicket
          POSTGRES_PASSWORD: computicket
          POSTGRES_DB: computicket
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U computicket"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://computicket:computicket@localhost:5432/computicket?schema=public
      NEXT_PUBLIC_API_URL: http://localhost:4000/v1
      JWT_SECRET: ci-test-jwt
      APP_KEY: ci-test-app-key
      PAYSTACK_SECRET_KEY: sk_test_replace_me
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @computicket/db exec prisma migrate deploy
      - run: pnpm typecheck
      - run: pnpm build:all
      - run: pnpm test:e2e

      # ---- A11y smoke suite ----
      # Seed reproducible event data so /events/davido-timeless-tour-lagos
      # is reachable, install Playwright's Chromium, then run the suite.
      # Playwright spins up `next start` itself; the API is brought up
      # here in the background so the web SSR + client calls have
      # somewhere to land.
      - run: pnpm db:seed
      - run: pnpm --filter @computicket/web exec playwright install --with-deps chromium
      - name: Start API in background
        env:
          # The Playwright suites sign in repeatedly from a single IP
          # (the runner). Without this flag the per-route throttler
          # 429s the functional suite's auth + organizer tests.
          DISABLE_THROTTLER: "1"
        run: |
          node apps/api/dist/main.js > /tmp/api.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV
          # Wait until the health probe answers; bail after 30s.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4000/v1/health >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"; cat /tmp/api.log; exit 1
      - run: pnpm --filter @computicket/web run test:a11y
      - run: pnpm --filter @computicket/web run test:functional
      - name: Stop API
        if: always()
        run: kill ${{ env.API_PID }} || true
      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: apps/web/playwright-report/
          retention-days: 14
      - name: Upload functional report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-functional-report
          path: apps/web/playwright-functional-report/
          retention-days: 14
