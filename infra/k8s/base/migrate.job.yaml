# Runs Prisma migrate deploy before (or alongside) a rollout. Overlay
# pipelines should `kubectl apply` this with a unique generated suffix
# on the name so concurrent rollouts don't collide.
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  annotations:
    # argocd.argoproj.io/hook: PreSync
    # argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    # ^ Uncomment if you drive deployments with ArgoCD.
    helm.sh/hook: pre-upgrade,pre-install
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          # Same image as the API — Prisma CLI ships with the runtime.
          image: ghcr.io/vitalclick/computicket-api:latest
          imagePullPolicy: IfNotPresent
          command: ["node_modules/.bin/prisma"]
          args: ["migrate", "deploy", "--schema=prisma/schema.prisma"]
          envFrom:
            - secretRef:
                name: computicket-secrets
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
