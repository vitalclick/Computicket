apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Each overlay (overlays/staging, overlays/prod) sets its own
# namespace, image tags, replica counts, hostnames, and patches in
# environment-specific config.
resources:
  - configmap.yaml
  - secret.template.yaml
  - api.deployment.yaml
  - api.service.yaml
  - api.hpa.yaml
  - web.deployment.yaml
  - web.service.yaml
  - web.hpa.yaml
  - migrate.job.yaml
  - ingress.yaml
  - poddisruptionbudgets.yaml

commonLabels:
  app.kubernetes.io/part-of: computicket
