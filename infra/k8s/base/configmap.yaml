apiVersion: v1
kind: ConfigMap
metadata:
  name: computicket-config
data:
  NODE_ENV: production
  PORT: "4000"
  # Public URLs are baked into Next.js at build time via Docker ARGs;
  # the API uses these at runtime for email links + NFT metadata.
  PUBLIC_WEB_URL: https://computicket.ng
  PUBLIC_API_URL: https://api.computicket.ng/v1
  # CORS allowlist (comma-separated). main.ts refuses to start in
  # production unless this is set.
  CORS_ALLOWED_ORIGINS: https://computicket.ng,https://www.computicket.ng
  # Feature flag — flip to "1" once the email verification flow is in
  # production and you want to enforce it on sensitive actions.
  REQUIRE_VERIFIED_EMAIL: "0"
