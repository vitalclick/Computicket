# TEMPLATE ONLY — never check actual secret values into git.
#
# In production, manage these via either:
#   - External Secrets Operator pulling from AWS Secrets Manager /
#     Vault, with an ExternalSecret resource that materialises this
#     name; OR
#   - Sealed Secrets, with `kubeseal` encrypting the values per-cluster.
#
# Apply order: this Secret must exist before the Deployments come up.
apiVersion: v1
kind: Secret
metadata:
  name: computicket-secrets
type: Opaque
stringData:
  # Sized for production: 32+ bytes, base64url. Generate with:
  #   openssl rand -base64 48
  JWT_SECRET: REPLACE_ME
  APP_KEY: REPLACE_ME
  STREAMING_SECRET: REPLACE_ME
  NFT_SIGNING_KEY: REPLACE_ME

  # Connection string for the managed Postgres (RDS / Cloud SQL).
  DATABASE_URL: REPLACE_ME

  # Paystack live keys.
  PAYSTACK_SECRET_KEY: REPLACE_ME
  PAYSTACK_PUBLIC_KEY: REPLACE_ME

  # Postmark (email).
  POSTMARK_SERVER_TOKEN: REPLACE_ME

  # Termii (SMS).
  TERMII_API_KEY: REPLACE_ME

  # Anthropic (AI support chatbot). Optional — unset = deterministic
  # keyword fallback.
  ANTHROPIC_API_KEY: ""

  # External partner adapters. Optional — unset = local-only results.
  DUFFEL_API_KEY: ""
  HOTELBEDS_API_KEY: ""
  HOTELBEDS_API_SECRET: ""

  # Sentry (error tracking). Optional — unset = stdout-only logging.
  SENTRY_DSN: ""

  # Public hosted logo for transactional emails. Optional.
  MAIL_LOGO_URL: https://computicket.ng/logo.png
