# Staging analogue of prod's external-secrets.yaml. The only diff is
# the AWS Secrets Manager secret names (computicket-staging/...).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: computicket-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: computicket-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: computicket-staging/app-secrets
    - extract:
        key: computicket-staging/partner-secrets
