apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: computicket
resources:
  - ../../base
  - namespace.yaml

images:
  # CI tags images with the commit SHA — set TAG via the deploy
  # pipeline (kustomize edit set image ghcr.io/...:$SHA).
  - name: ghcr.io/vitalclick/computicket-api
    newTag: TAG
  - name: ghcr.io/vitalclick/computicket-web
    newTag: TAG

# Scale up for prod traffic.
replicas:
  - name: api
    count: 3
  - name: web
    count: 3
