# Wires the External Secrets Operator into AWS Secrets Manager. The
# SecretStore + ExternalSecret pair runs ESO in pull mode: every hour
# (refreshInterval) it reads computicket-prod/{app,partner}-secrets
# from Secrets Manager and materialises a k8s Secret named
# computicket-secrets containing every key from both. The API and
# migrate-Job Deployments envFrom that Secret, so a rotation in AWS
# propagates within 60 minutes without touching the cluster.
#
# Prereq: external-secrets Helm chart installed in the
# external-secrets namespace, with the ServiceAccount `external-
# secrets` annotated with the IRSA role from Terraform's
# external_secrets_role_arn output. infra/scripts/launch.sh
# does both for you.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        # IRSA — the ServiceAccount running the ESO controller has the
        # eks.amazonaws.com/role-arn annotation set to the read-only
        # IAM role our Terraform module creates. No long-lived keys.
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: computicket-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: computicket-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: computicket-prod/app-secrets
    - extract:
        key: computicket-prod/partner-secrets
